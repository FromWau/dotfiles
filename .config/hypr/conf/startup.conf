# Wallpaper
exec-once = awww-daemon
exec = sleep 2 && awww restore

# Battery notifications
exec-once = battery-notify

# Playerctld
exec-once = playerctld daemon

# mpDris2
exec-once = mpDris2 --use-journal

# Ags (managed by systemd for auto-restart on the GTK4 monitor-toggle Wayland crash)
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP HYPRLAND_INSTANCE_SIGNATURE XDG_SESSION_TYPE && systemctl --user start ags.service
exec-once = sleep 1 && ags request mousemode false

# Polkit
exec-once = systemctl --user start plasma-polkit-agent.service

# KDE-Connect
exec-once = kdeconnectd 
exec-once = kdeconnect-indicator

# Pywalfox
exec-once = pywalfox start

# Fix Bitwarden Firefox extension opening fullscreen
exec-once = fix-bitwarden

# Hypridle
# exec-once = hypridle

# Walker
exec-once = elephant
exec-once = walker --gapplication-service

